<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neon Dodgeball</title>
  <meta name="description" content="A dynamic and aesthetic dodgeball game where you avoid falling neon balls.">
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
</head>

<body>
  <div id="game-container">
    <div id="ui-layer">
      <div id="score-board" class="hidden">Score: <span id="score">0</span></div>

      <div id="start-screen" class="screen glass">
        <h1>Neon Dodge</h1>
        <p style="margin-bottom: 15px;">Use <strong>Left/Right</strong> arrow keys or <strong>Swipe</strong> to dodge
          the falling objects.</p>
        <p style="font-size: 0.95rem; color: #a855f7; margin-bottom: 25px; margin-top: 0;"><em>This game increases your
            speed and accuracy!</em></p>
        <div
          style="font-size: 0.95rem; color: #cbd5e1; margin-bottom: 35px; text-align: center; line-height: 1.6; background: rgba(0,0,0,0.25); padding: 12px 24px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); box-shadow: inset 0 0 10px rgba(0,0,0,0.5);">
          <strong style="color: #fff; font-size: 1.05rem; display: block; margin-bottom: 5px;">🎖️ Target
            Milestones</strong>
          <span style="color: #38bdf8; font-weight: bold;">50+ Points</span> : Sharp Minded 🧠<br>
          <span style="color: #ec4899; font-weight: bold;">80+ Points</span> : Great Presence of Mind ⚡
        </div>
        <button id="start-btn" class="btn">Start Game</button>
      </div>

      <div id="game-over-screen" class="screen glass hidden">
        <h1>Game Over</h1>
        <p>Final Score: <span id="final-score">0</span></p>
        <button id="restart-btn" class="btn">Restart</button>
      </div>
    </div>
    <canvas id="game-canvas"></canvas>
  </div>
  <script src="script.js"></script>
</body>

</html>
